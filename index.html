<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KAJEPIT</title>
    <meta name="description" content="KAJEPIT - Game tebak kata seru untuk TikTok Live!" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="/output.css" rel="stylesheet" />
    <style>
      body {
        background-color: #040d14;
        color: #fff;
        overflow: hidden;
      }

      /* Hide Scrollbar */
      ::-webkit-scrollbar {
        display: none;
      }
      * {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Selection */
      ::selection {
        background: rgba(74, 222, 128, 0.3);
      }

      /* Smooth list transitions */
      .list-enter {
        animation: fade-in 0.3s ease-out forwards;
      }
      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Modal & Player Glow */
      .modal-glow {
        box-shadow:
          0 0 50px rgba(74, 222, 128, 0.15),
          0 25px 50px -12px rgba(0, 0, 0, 0.8);
      }

      /* Spin Animation for Vinyl */
      @keyframes spin-slow {
        100% {
          transform: rotate(360deg);
        }
      }
      .animate-spin-slow {
        animation: spin-slow 4s linear infinite;
      }

      /* --- STREAK ANIMATIONS --- */
      @keyframes flame-flicker {
        0%, 100% { transform: scaleY(1) scaleX(1); opacity: 1; }
        25% { transform: scaleY(1.08) scaleX(0.95); opacity: 0.9; }
        50% { transform: scaleY(0.95) scaleX(1.05); opacity: 1; }
        75% { transform: scaleY(1.05) scaleX(0.97); opacity: 0.85; }
      }
      @keyframes streak-glow-pulse {
        0%, 100% { filter: drop-shadow(0 0 4px currentColor); }
        50% { filter: drop-shadow(0 0 12px currentColor) drop-shadow(0 0 20px currentColor); }
      }
      @keyframes shimmer-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
      }
      .streak-flame {
        animation: flame-flicker 0.6s ease-in-out infinite;
        transform-origin: bottom center;
      }
      .streak-glow {
        animation: streak-glow-pulse 2s ease-in-out infinite;
      }
      .streak-badge-shimmer::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
        animation: shimmer-slide 2.5s ease-in-out infinite;
      }
      @keyframes streak-pop {
        0% { transform: scale(0.5); opacity: 0; }
        60% { transform: scale(1.15); }
        100% { transform: scale(1); opacity: 1; }
      }
      .streak-pop-in {
        animation: streak-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      /* --- WIN OVERLAY ENHANCEMENTS --- */
      @keyframes avatar-ring-pulse {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.15); opacity: 0.2; }
      }
      @keyframes avatar-ring-rotate {
        100% { transform: rotate(360deg); }
      }
      @keyframes win-word-glow {
        0%, 100% { text-shadow: 0 0 10px rgba(74,222,128,0.4), 0 0 30px rgba(74,222,128,0.2); }
        50% { text-shadow: 0 0 20px rgba(74,222,128,0.6), 0 0 50px rgba(74,222,128,0.3), 0 0 80px rgba(74,222,128,0.15); }
      }
      @keyframes float-particle {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        100% { transform: translateY(-60px) scale(0); opacity: 0; }
      }
      .win-word-glow {
        animation: win-word-glow 2s ease-in-out infinite;
      }
      .avatar-ring-pulse {
        animation: avatar-ring-pulse 2s ease-in-out infinite;
      }
      .avatar-ring-rotate {
        animation: avatar-ring-rotate 8s linear infinite;
      }
    </style>
  </head>
  <body class="h-screen w-screen flex items-center justify-center font-sans antialiased">
    <!-- Main Game Container (Mobile/Chat format) -->
    <main class="w-full max-w-lg h-full md:h-[90vh] flex flex-col relative bg-stream-bg md:border md:border-gray-800 md:rounded-xl overflow-hidden shadow-2xl">
      <!-- Header -->
      <header class="p-4 border-b border-gray-800 bg-stream-bg z-10 flex justify-between items-center shrink-0">
        <div>
          <h1 class="text-xl font-bold tracking-tight text-white flex items-center gap-1">
            <span onclick="toggleFullScreen()" class="cursor-pointer hover:text-gray-300 transition-colors" title="Klik untuk Fullscreen">KAJEPIT</span><span id="ws-status-indicator" class="text-yellow-400 transition-colors duration-300 cursor-pointer" onclick="openConnectModal()" title="Klik untuk koneksi TikTok">!</span>
          </h1>
          <p id="subtitle-text" class="text-xs text-gray-400">Cari kata yang terjepit!</p>
        </div>
        <div class="text-xs font-semibold text-gray-500 bg-gray-900 px-3 py-1.5 rounded-md">Tebakan: <span id="guess-count" class="text-white">0</span></div>
      </header>

      <!-- Last Winner Banner -->
      <div
        id="last-winner-banner"
        class="hidden px-4 py-2.5 border-b border-gray-800/80 bg-gradient-to-r from-[#0a1118] to-stream-bg flex items-center justify-between shrink-0 text-[11px] sm:text-xs z-10 shadow-sm">
        <div class="flex items-center gap-2.5">
          <span
            class="text-yellow-400 font-bold tracking-widest uppercase text-[9px] bg-yellow-500/10 border border-yellow-500/20 px-2 py-0.5 rounded shadow-[0_0_8px_rgba(250,204,21,0.15)] hidden sm:inline-block"
            >LAST WINNER</span
          >
          <span class="text-yellow-400 font-bold tracking-widest uppercase text-[9px] bg-yellow-500/10 border border-yellow-500/20 px-2 py-0.5 rounded shadow-[0_0_8px_rgba(250,204,21,0.15)] sm:hidden"
            >WINNER</span
          >

          <div id="last-winner-avatar" class="w-5 h-5 rounded-full overflow-hidden border border-gray-600 flex items-center justify-center bg-[#2563eb] shrink-0"></div>
          <span id="last-winner-name" class="text-white font-bold max-w-[80px] sm:max-w-[120px] truncate">Name</span>
          <!-- Streak Badge (Banner) -->
          <div id="banner-streak-badge" class="hidden items-center gap-1 relative overflow-hidden px-1.5 py-0.5 rounded border streak-badge-shimmer">
            <svg id="banner-streak-flame" class="w-3 h-3 streak-flame" viewBox="0 0 24 24" fill="none">
              <path d="M12 2C8.5 7 4 9.5 4 14a8 8 0 0016 0c0-4.5-4.5-7-8-12z" fill="url(#bannerFlameGrad)" stroke="none"/>
              <path d="M12 9c-1.5 2.5-3 3.5-3 6a3 3 0 006 0c0-2.5-1.5-3.5-3-6z" fill="#FDE68A" opacity="0.9"/>
              <defs><linearGradient id="bannerFlameGrad" x1="12" y1="2" x2="12" y2="22" gradientUnits="userSpaceOnUse"><stop stop-color="#FBBF24"/><stop offset="1" stop-color="#EF4444"/></linearGradient></defs>
            </svg>
            <span id="banner-streak-count" class="text-[9px] font-black tracking-wide">x2</span>
          </div>
        </div>
        <div class="flex items-center gap-2 bg-black/40 px-2.5 py-1 rounded border border-white/5 shadow-inner">
          <span class="text-gray-500 font-bold uppercase text-[9px] tracking-wider hidden sm:inline">LAST WORD</span>
          <span id="last-secret-word" class="font-bold text-stream-green uppercase tracking-widest drop-shadow-[0_0_5px_rgba(74,222,128,0.3)]">WORD</span>
        </div>
      </div>

      <!-- Chat / Guess List -->
      <div id="guess-list" class="flex-1 overflow-y-auto p-3 flex flex-col justify-center gap-[3px] scroll-smooth pb-[30vh] cursor-text relative">
        <!-- Permanent Input Box -->
        <form id="secret-divider" class="my-1 w-full shrink-0 relative z-20 hidden" style="order: 2">
          <input
            type="text"
            id="dynamic-guess-input"
            autocomplete="off"
            inputmode="none"
            placeholder="Ketik kata pertama untuk memulai..."
            class="w-full bg-[#02060a] rounded-md p-3 text-sm text-center text-white placeholder-gray-500 font-medium outline-none focus:bg-[#07121c] transition-all duration-300 caret-white border border-transparent focus:border-stream-green/40 focus:shadow-[0_0_15px_rgba(74,222,128,0.15)]" />
        </form>

        <div class="flex items-center justify-center flex-col gap-3 text-center text-gray-500" id="empty-state" style="order: 3">
          <svg class="w-12 h-12 opacity-50 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24" id="loading-icon">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
          </svg>
          <p class="text-sm" id="empty-state-text">Memuat kamus...<br />Mohon tunggu sebentar.</p>
        </div>
      </div>

      <!-- Floating Error Toast (Sekarang juga digunakan untuk error Youtube) -->
      <div
        id="error-toast"
        class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-red-500/90 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow-lg hidden opacity-0 transition-opacity duration-300 z-50 pointer-events-none text-center max-w-[90%]">
        Kata tidak valid!
      </div>
    </main>

    <!-- UI Overlay Section -->
    <div class="fixed inset-0 pointer-events-none z-[100] w-full h-full overflow-hidden">
      <!-- Rank Toast Notification Container -->
      <div id="rank-toast-container" class="absolute bottom-[280px] right-4 sm:right-6 flex flex-col items-end"></div>

      <!-- Aesthetic Music Player Overlay (Minimalist & Collapsible Queue) -->
      <div
        id="music-player-overlay"
        class="absolute bottom-20 right-4 sm:right-6 w-72 bg-[#0a1118]/85 backdrop-blur-xl border border-gray-700/50 rounded-xl shadow-[0_10px_30px_rgb(0,0,0,0.8)] flex flex-col overflow-hidden transform translate-y-[150%] opacity-0 transition-all duration-500 pointer-events-auto">
        <!-- Player Main Info -->
        <div class="flex items-center p-3 gap-3">
          <!-- Vinyl Record Thumbnail -->
          <div class="relative w-12 h-12 rounded-full overflow-hidden border-[2px] border-[#1e293b] shrink-0 shadow-[0_0_10px_rgba(0,0,0,0.6)]" id="player-thumb-container">
            <img id="player-thumbnail" src="" class="w-full h-full object-cover" alt="thumbnail" />
            <div class="absolute inset-0 m-auto w-2.5 h-2.5 bg-[#0a1118] rounded-full border border-gray-600"></div>
          </div>

          <!-- Song Info & Controls -->
          <div class="flex-1 min-w-0 flex flex-col justify-center">
            <div class="text-[8px] font-bold text-stream-green tracking-[0.15em] uppercase mb-0.5 flex items-center gap-1 drop-shadow-[0_0_3px_rgba(74,222,128,0.5)]">
              <span id="player-status-dot" class="w-1.5 h-1.5 rounded-full bg-stream-green animate-pulse shadow-[0_0_5px_#4ade80]"></span>
              <span id="player-status-text">SEDANG DIPUTAR</span>
            </div>
            <div id="player-title" class="text-xs font-bold text-white truncate w-full shadow-sm leading-tight mb-1">Song Title</div>

            <div class="flex items-center justify-between mt-0.5">
              <div class="text-[9px] text-gray-400 flex items-center gap-1.5">
                <div id="player-req-avatar-container" class="w-3.5 h-3.5 rounded-full overflow-hidden border border-gray-600 shrink-0"></div>
                <span id="player-req-name" class="font-medium text-gray-300 truncate max-w-[70px]">Name</span>
              </div>

              <!-- Controls: Prev, Play/Pause, Next -->
              <div class="flex items-center gap-3 shrink-0 mr-1">
                <button id="btn-prev" class="text-gray-400 hover:text-white transition-colors focus:outline-none" title="Ulangi Lagu">
                  <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" /></svg>
                </button>
                <button id="btn-play-pause" class="text-white hover:text-stream-green hover:scale-110 transition-all focus:outline-none" title="Play/Pause">
                  <!-- Pause Icon (Default when playing) -->
                  <svg id="icon-pause" class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" /></svg>
                  <!-- Play Icon -->
                  <svg id="icon-play" class="w-4 h-4 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
                </button>
                <button id="btn-skip" class="text-gray-400 hover:text-white transition-colors focus:outline-none" title="Skip Next">
                  <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" /></svg>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Toggle Dropdown Antrean -->
        <div
          id="player-queue-toggle"
          class="hidden px-3 py-1.5 bg-black/30 hover:bg-black/50 cursor-pointer text-[9px] text-gray-400 border-t border-gray-800/50 flex justify-between items-center transition-colors">
          <span class="flex items-center gap-1.5 font-medium"><span class="w-1 h-1 bg-gray-500 rounded-full"></span> Antrean (<span id="player-queue-count">0</span>)</span>
          <svg id="queue-chevron" class="w-3 h-3 transform transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </div>

        <!-- Up Next / Queue Info (Collapsible) -->
        <div id="player-queue-container" class="hidden flex-col bg-[#05080c]">
          <!-- Viewport 84px (Tepat untuk 3 baris @ 28px) -->
          <div class="relative h-[84px] overflow-hidden" id="queue-viewport">
            <div id="queue-list-wrapper" class="flex flex-col transition-transform duration-500 ease-in-out">
              <!-- Items injected here by JS -->
            </div>
          </div>
        </div>

        <!-- Progress Bar (Clickable) -->
        <div class="w-full h-1 bg-gray-800/80 cursor-pointer hover:h-2 transition-all group" id="progress-container">
          <div id="player-progress" class="h-full bg-stream-green w-0 group-hover:bg-green-400 transition-all duration-[1000ms] ease-linear shadow-[0_0_10px_#4ade80]"></div>
        </div>
      </div>
    </div>

    <!-- Confetti Canvas -->
    <!-- FIX: z-[200] agar confetti tampil DI ATAS win modal z-[150] -->
    <canvas id="confetti-canvas" class="fixed inset-0 pointer-events-none z-[200] w-full h-full"></canvas>

    <!-- TikTok Connect Modal -->
    <div id="connect-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[250] flex items-center justify-center transition-opacity duration-300 opacity-0 pointer-events-none">
      <div class="relative bg-[#0a1118]/95 backdrop-blur-2xl border border-gray-700/50 w-[90%] max-w-sm p-8 rounded-3xl flex flex-col items-center text-center modal-glow transform transition-all duration-500 translate-y-8 scale-95" id="connect-modal-content">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-1 bg-gradient-to-r from-transparent via-stream-green to-transparent opacity-70 blur-[2px] rounded-t-3xl"></div>
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-1/2 h-[1px] bg-gradient-to-r from-transparent via-stream-green to-transparent opacity-100"></div>

        <!-- TikTok Icon -->
        <div class="mb-4 w-16 h-16 rounded-2xl bg-gradient-to-br from-[#25F4EE] via-[#FE2C55] to-[#000] flex items-center justify-center shadow-[0_0_30px_rgba(254,44,85,0.2)]">
          <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1v-3.52a6.37 6.37 0 00-.79-.05A6.34 6.34 0 003.15 15.2a6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.34-6.34V8.72a8.2 8.2 0 004.76 1.52V6.79a4.84 4.84 0 01-1-.1z"/></svg>
        </div>

        <h2 class="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-300 mb-1">Koneksi TikTok</h2>
        <p class="text-gray-500 text-[11px] mb-5">Masukkan username TikTok Live kamu</p>

        <!-- Status indicator -->
        <div id="connect-status" class="hidden w-full mb-4 px-3 py-2 rounded-xl text-[11px] font-bold text-center"></div>

        <div class="relative w-full mb-4">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 font-bold text-sm">@</span>
          <input id="tiktok-username-input" type="text" placeholder="username" autocomplete="off" spellcheck="false"
            class="w-full bg-[#121c29] border border-[#1e2d40] rounded-xl py-3 pl-8 pr-4 text-white font-bold text-sm focus:outline-none focus:border-stream-green/50 focus:shadow-[0_0_15px_rgba(74,222,128,0.1)] transition-all placeholder:text-gray-600" />
        </div>

        <button id="btn-connect-tiktok" onclick="connectTikTok()" class="w-full bg-gradient-to-r from-stream-green to-[#22c55e] text-[#040d14] font-bold text-sm py-3 rounded-xl hover:brightness-110 transition-all hover:scale-[1.02] active:scale-[0.98] shadow-[0_0_20px_rgba(74,222,128,0.2)] mb-2">
          Hubungkan
        </button>

        <button id="btn-disconnect-tiktok" onclick="disconnectTikTok()" class="hidden w-full bg-red-950/50 border border-red-500/30 text-red-400 font-bold text-[11px] py-2 rounded-xl hover:bg-red-950/80 transition-all mb-2">
          Putuskan Koneksi
        </button>

        <button onclick="closeConnectModal()" class="text-gray-500 hover:text-gray-300 text-[11px] font-medium mt-1 transition-colors">
          Tutup
        </button>
      </div>
    </div>

    <!-- Win Modal -->
    <div id="win-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[150] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500 pb-[10vh]">
      <div
        class="relative bg-[#0a1118]/95 backdrop-blur-2xl border border-gray-700/50 w-[90%] max-w-sm p-8 pt-10 rounded-3xl flex flex-col items-center text-center modal-glow transform transition-all duration-500 translate-y-8 scale-95"
        id="win-modal-content">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-1 bg-gradient-to-r from-transparent via-stream-green to-transparent opacity-70 blur-[2px] rounded-t-3xl"></div>
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-1/2 h-[1px] bg-gradient-to-r from-transparent via-stream-green to-transparent opacity-100"></div>

        <!-- Avatar with Animated Rings -->
        <div class="relative mb-5 h-32 w-32 flex items-center justify-center">
          <!-- Outer rotating dashed ring -->
          <div class="absolute inset-[-8px] rounded-full border-2 border-dashed border-stream-green/30 avatar-ring-rotate"></div>
          <!-- Middle pulsing glow ring -->
          <div class="absolute inset-[-4px] rounded-full bg-gradient-to-b from-stream-green/20 to-blue-500/20 avatar-ring-pulse"></div>
          <!-- Avatar container -->
          <div
            id="win-avatar-container"
            class="relative h-28 w-28 flex items-center justify-center rounded-full p-1 bg-gradient-to-b from-stream-green to-blue-500 shadow-[0_0_30px_rgba(74,222,128,0.25),0_0_60px_rgba(74,222,128,0.1)]"></div>
          <!-- Crown/Trophy SVG -->
          <div class="absolute -top-3 left-1/2 -translate-x-1/2 streak-pop-in">
            <svg class="w-8 h-8 drop-shadow-[0_0_8px_rgba(250,204,21,0.5)]" viewBox="0 0 24 24" fill="none">
              <path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5z" fill="url(#crownGrad)" stroke="#CA8A04" stroke-width="0.5"/>
              <rect x="5" y="16" width="14" height="2" rx="1" fill="url(#crownGrad)"/>
              <defs><linearGradient id="crownGrad" x1="12" y1="4" x2="12" y2="18" gradientUnits="userSpaceOnUse"><stop stop-color="#FDE68A"/><stop offset="1" stop-color="#F59E0B"/></linearGradient></defs>
            </svg>
          </div>
        </div>

        <h2 id="win-title" class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-300 mb-2 tracking-tight drop-shadow-md">Tebakan Benar!</h2>
        <p class="text-gray-400 text-[11px] mb-4 font-bold uppercase tracking-[0.2em]">Kata Rahasia</p>

        <div
          class="relative w-full py-5 rounded-2xl mb-8 bg-gradient-to-b from-[#121c29] to-[#040d14] border border-[#1e2d40] shadow-[inset_0_4px_20px_rgba(0,0,0,0.4)] overflow-hidden flex justify-center items-center">
          <div
            class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPjxyZWN0IHdpZHRoPSI0IiBoZWlnaHQ9IjQiIGZpbGw9IiNmZmYiIGZpbGwtb3BhY2l0eT0iMC4wMiIvPjwvc3ZnPg==')] opacity-50 pointer-events-none"></div>
          <!-- Floating particles background -->
          <div id="win-word-particles" class="absolute inset-0 overflow-hidden pointer-events-none"></div>
          <span id="win-word" class="relative text-3xl font-black text-stream-green tracking-[0.25em] uppercase win-word-glow">WORD</span>
        </div>

        <!-- Streak Display (Win Modal) -->
        <div id="win-streak-container" class="hidden w-full mb-6 streak-pop-in">
          <div id="win-streak-badge" class="relative overflow-hidden mx-auto w-fit flex items-center gap-2 px-4 py-2 rounded-xl border streak-badge-shimmer">
            <svg class="w-5 h-5 streak-flame streak-glow" viewBox="0 0 24 24" fill="none">
              <path d="M12 2C8.5 7 4 9.5 4 14a8 8 0 0016 0c0-4.5-4.5-7-8-12z" fill="url(#modalFlameGrad)" stroke="none"/>
              <path d="M12 9c-1.5 2.5-3 3.5-3 6a3 3 0 006 0c0-2.5-1.5-3.5-3-6z" fill="#FDE68A" opacity="0.9"/>
              <defs><linearGradient id="modalFlameGrad" x1="12" y1="2" x2="12" y2="22" gradientUnits="userSpaceOnUse"><stop stop-color="#FBBF24"/><stop offset="1" stop-color="#EF4444"/></linearGradient></defs>
            </svg>

          if (arr[mid] < value) lo = mid + 1;
          else hi = mid;
        }
        arr.splice(lo, 0, value);

      function resizeConfetti() {

      function shootConfetti() {
        const colors = ["#4ade80", "#3b82f6", "#facc15", "#f472b6", "#a855f7", "#ffffff", "#22d3ee", "#fb923c"];
        const cw = confettiCanvas.width;
        const ch = confettiCanvas.height;

        function addBurst(originX, originY, count, spread) {
          for (let i = 0; i < count; i++) {
            confettiParticles.push({
              x: originX,
              y: originY,
              r: Math.random() * 5 + 2,
              dx: (Math.random() - 0.5) * spread,
              dy: Math.random() * -18 - 6,
              color: colors[Math.floor(Math.random() * colors.length)],
              tilt: Math.floor(Math.random() * 10) - 10,
              tiltAngleInc: Math.random() * 0.07 + 0.05,
              tiltAngle: 0,
              gravity: 0.06 + Math.random() * 0.04,
              opacity: 1,
              decay: 0.005 + Math.random() * 0.005
            });
          }
        }

        // Wave 1: Center burst
        confettiParticles = [];
        addBurst(cw / 2, ch * 0.35, 60, 10);
        // Wave 2: Left burst (delayed)
        setTimeout(() => addBurst(cw * 0.25, ch * 0.45, 40, 8), 300);
        // Wave 3: Right burst (delayed)
        setTimeout(() => addBurst(cw * 0.75, ch * 0.45, 40, 8), 500);
        // Wave 4: Top shower
        setTimeout(() => addBurst(cw / 2, ch * 0.1, 50, 14), 800);

        if (!confettiAnimationId) Confetti();
      }

      function Confetti() {
        ctxConfetti.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        let activeParticles = 0;
        confettiParticles.forEach((p) => {
          if (p.y < confettiCanvas.height + 20 && p.opacity > 0.01) {
            activeParticles++;
            p.tiltAngle += p.tiltAngleInc;
            p.y += (Math.cos(p.tiltAngle) + 1 + p.r / 2) / 2;
            p.x += Math.sin(p.tiltAngle) * 2;
            p.dy += (p.gravity || 0.08);
            p.y += p.dy;
            p.x += p.dx;
            p.dx *= 0.99; // slight air resistance
            p.opacity = Math.max(0, p.opacity - (p.decay || 0));

            ctxConfetti.globalAlpha = p.opacity;
            ctxConfetti.beginPath();
            ctxConfetti.lineWidth = p.r;
            ctxConfetti.strokeStyle = p.color;
            ctxConfetti.moveTo(p.x + p.tilt + p.r, p.y);
            ctxConfetti.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
            ctxConfetti.stroke();
          }
        });
        ctxConfetti.globalAlpha = 1;
        if (activeParticles > 0) {
          confettiAnimationId = requestAnimationFrame(Confetti);
        } else {
          cancelAnimationFrame(confettiAnimationId);
          confettiAnimationId = null;
          ctxConfetti.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        }
      }

      function playWinSound() {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const ctx = new AudioContext();
          const notes = [523.25, 659.25, 783.99, 987.77, 1046.5];
          let startTime = ctx.currentTime;
          notes.forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            osc.type = "sine";
            osc.frequency.setValueAtTime(freq, startTime + i * 0.1);
            gainNode.gain.setValueAtTime(0, startTime + i * 0.1);
            gainNode.gain.linearRampToValueAtTime(0.15, startTime + i * 0.1 + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + i * 0.1 + 0.6);
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            osc.start(startTime + i * 0.1);
            osc.stop(startTime + i * 0.1 + 0.6);
          });
        } catch (e) {}
      }

      function setupWebSocket() {
        updateWSStatus("connecting");

        const ws = new WebSocket(BACKEND_WS);
        globalWs = ws;

        ws.onopen = function () {
          updateWSStatus("connected");
        };

        ws.onmessage = function (data) {
          try {
            const message = JSON.parse(data.data);
            const { event, data: eventData } = message;

            if (event === "chat") {
              let nick = eventData.nickname || eventData.uniqueId || "Penonton";
              nick = nick.trim();
              if (nick.startsWith("@")) nick = nick.substring(1);

              const comment = eventData.comment || "";
              if (comment) {
                if (comment.trim().toLowerCase().startsWith("!myrank")) {
                  handleRankCommand(nick, eventData.profilePictureUrl);
                } else {
                  processGuess(comment, nick, eventData.profilePictureUrl, false);
                }
              }
            } else if (event === "play_track") {
              handlePlayTrack(eventData);
            } else if (event === "player_stop") {
              handleStopTrack();
            } else if (event === "queue_update") {
              handleQueueUpdate(eventData);
            } else if (event === "tiktok_status") {
              handleTiktokStatus(eventData);
            }
          } catch (error) {
            console.error("Error parsing message:", error);
          }
        };

        ws.onclose = function () {
          updateWSStatus("disconnected");
          setTimeout(setupWebSocket, 5000);
        };

        ws.onerror = function (err) {
          updateWSStatus("disconnected");
        };

          showConnectStatus("Menghubungkan...", "loading");
          btnConnect.disabled = true;
          btnConnect.innerText = "Menghubungkan...";
        }
      }

      function toggleFullScreen() {
        const elem = document.documentElement;
        if (!document.fullscreenElement && !document.mozFullScreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
          if (elem.requestFullscreen) {
            elem.requestFullscreen();
          } else if (elem.msRequestFullscreen) {
            elem.msRequestFullscreen();
          } else if (elem.mozRequestFullScreen) {
            elem.mozRequestFullScreen();
          } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
          }
        } else {
          if (document.exitFullscreen) {
            document.exitFullscreen();
          } else if (document.msExitFullscreen) {
            document.msExitFullscreen();
          } else if (document.mozCancelFullScreen) {
            document.mozCancelFullScreen();
          } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
          }
        }
      }

      async function loadDictionaries() {
        try {
          const [kataUmumRes, kamusRes] = await Promise.all([fetch("kata_umum.txt").catch(() => null), fetch("kamus.txt").catch(() => null)]);

          let kataUmumLoaded = false;
          let kamusLoaded = false;

          if (kataUmumRes && kataUmumRes.ok) {
            const text = await kataUmumRes.text();
            targetWords = text
              .split(/\r?\n/)
              .map((w) => w.trim().toLowerCase())
              .filter((w) => /^[a-z]+$/.test(w));
            if (targetWords.length > 0) kataUmumLoaded = true;
          }

          if (kamusRes && kamusRes.ok) {
            const text = await kamusRes.text();
            const validWordsArr = text
              .split(/\r?\n/)
              .map((w) => w.trim().toLowerCase())
              .filter((w) => /^[a-z]+$/.test(w));
            validWordsSet = new Set(validWordsArr);
            if (validWordsArr.length > 0) kamusLoaded = true;
          }

          if (!kataUmumLoaded || !kamusLoaded) {
            if (!kataUmumLoaded) targetWords = [...defaultDictionary];
            if (!kamusLoaded) validWordsSet = new Set(defaultDictionary);
          }

          targetWords.sort();
          availableTargetWords = [...targetWords];
        } catch (error) {
          targetWords.sort();
          availableTargetWords = [...targetWords];
        }
        emptyStateEl.style.display = "none";
      }

      function initGame() {
        clearTimeout(autoRestartTimeout);
        clearInterval(autoRestartInterval);
        if (btnRestart) btnRestart.innerText = "Main Lagi";

        if (availableTargetWords.length === 0) availableTargetWords = [...targetWords];

        const randomIndex = Math.floor(Math.random() * availableTargetWords.length);
        secretWord = availableTargetWords.splice(randomIndex, 1)[0];

        guesses = [];
        guessSet = new Set();
        guessDetails = {};
        latestGuess = "";
        isGameOver = false;
        countEl.innerText = "0";

        winModalOverlay.classList.remove("opacity-100");
        winModalOverlay.classList.add("opacity-0", "pointer-events-none");
        winModalContent.classList.remove("scale-100", "translate-y-0");
        winModalContent.classList.add("scale-95", "translate-y-8");

        ctxConfetti.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        if (confettiAnimationId) {
          cancelAnimationFrame(confettiAnimationId);
          confettiAnimationId = null;
        }

        dividerForm.style.display = "block";
        dynamicInput.value = "";
        dynamicInput.setAttribute("inputmode", "none");

        updateLastWinnerBanner();
        renderUI(true);
      }

      function getPrefixMatchCount(guess, secret) {
        let count = 0;
        for (let i = 0; i < Math.min(guess.length, secret.length); i++) {
          if (guess[i] === secret[i]) count++;
          else break;
        }
        return count;
      }

      function showError(msg) {
        errorToastEl.innerText = msg;
        errorToastEl.classList.remove("hidden", "opacity-0");
        errorToastEl.classList.add("opacity-100");
        setTimeout(() => {
          errorToastEl.classList.remove("opacity-100");
          errorToastEl.classList.add("opacity-0");
          setTimeout(() => {
            errorToastEl.classList.add("hidden");
          }, 300);
        }, 2000);
      }

      function processGuess(guess, nickname = "Kamu", profilePic = null, isLocal = true) {
        if (isGameOver) return false;

        guess = guess.toLowerCase().replace(/[^a-z]/g, "");

        if (!guess) {
          if (isLocal) showError("Hanya huruf abjad yang diperbolehkan!");
          return false;
        }
        if (!validWordsSet.has(guess)) {
          if (isLocal) showError("Kata tidak terdaftar di kamus!");
          return false;
        }
        if (guessSet.has(guess)) {
          if (isLocal) showError("Kata sudah pernah ditebak!");
          return false;
        }

        latestGuess = guess;
        guessSet.add(guess);
        binaryInsert(guesses, guess);

        guessDetails[guess] = { nickname, profilePic };
        countEl.innerText = guesses.length;

        if (guess === secretWord) handleWin();
        else renderUI(isLocal);

        return true;
      }

      function createGuessElement(guess) {
        const matchCount = getPrefixMatchCount(guess, secretWord);
        const prefix = guess.substring(0, matchCount);
        const suffix = guess.substring(matchCount);
        const isLatest = guess === latestGuess;
        const details = guessDetails[guess] || { nickname: "Kamu", profilePic: null };

        const wins = userWins[details.nickname] || 0;
        const tierInfo = getTierInfo(wins);

        const item = document.createElement("div");
        item.className = `guess-item-node bg-stream-row p-2 relative flex items-center rounded-md mb-1 transition-all ${isLatest ? "list-enter border border-white/80 shadow-sm" : "border border-transparent"}`;

        let wordHTML = "";
        if (matchCount > 0) wordHTML = `<span class="text-stream-green">${prefix}</span><span class="text-white">${suffix}</span>`;
        else wordHTML = `<span class="text-white">${guess}</span>`;

        // FIX: Escape semua user-controlled content sebelum inject ke innerHTML
        let avatarHTML = details.profilePic
          ? `<img src="${escapeHTML(details.profilePic)}" alt="avatar" class="w-8 h-8 rounded-full shrink-0 object-cover border border-gray-600">`
          : `<div class="w-8 h-8 rounded-full overflow-hidden shrink-0 border border-gray-600">${userAvatarSVG}</div>`;

        item.innerHTML = `
                <div class="flex items-center gap-2.5 relative z-10 w-[45%] max-w-[45%]">
                    ${avatarHTML}
                    <div class="flex flex-col min-w-0 justify-center">
                        <span class="font-bold text-white text-[13px] truncate leading-tight mb-0.5" title="${escapeHTML(details.nickname)}">${escapeHTML(details.nickname)}</span>
                        <div class="flex items-center">
                            <span class="text-[9px] font-bold tracking-wider uppercase px-1.5 py-0.5 rounded border shadow-sm ${tierInfo.color} leading-none truncate flex items-center gap-0.5" title="${wins} Kemenangan">
                                ${tierInfo.icon ? `<svg class="w-2.5 h-2.5 shrink-0 fill-current" viewBox="0 0 24 24"><path d="${tierInfo.icon}"/></svg>` : ''}
                                ${tierInfo.name}
                            </span>
                        </div>
                    </div>
                </div>
                <div class="absolute inset-0 flex items-center justify-center font-bold text-[16px] tracking-wide pointer-events-none z-0">
                    ${wordHTML}
                </div>
            `;
        return item;
      }

      function updateDividerInfo(lower, upper, isInitial = false) {
        const lowerText = lower ? lower : "a";
        const upperText = upper ? upper : "z";
        const placeholderText = isInitial ? "Ketik kata pertama untuk memulai..." : `Kata rahasia di antara '${lowerText}' dan '${upperText}'`;

        dynamicInput.placeholder = placeholderText;
        if (isInitial) {
          dynamicInput.classList.remove("text-left");
          dynamicInput.classList.add("text-center");
        } else {
          dynamicInput.classList.remove("text-center");
          dynamicInput.classList.add("text-left");
        }
      }

      // FIX: Optimasi renderUI — gunakan DocumentFragment untuk batch DOM ops
      function renderUI(shouldFocus = false) {
        const oldItems = listEl.querySelectorAll(".guess-item-node");
        oldItems.forEach((item) => item.remove());

        const VISIBLE_HALF = 4;
        const fragAbove = document.createDocumentFragment();
        const fragBelow = document.createDocumentFragment();

        if (guesses.length === 0) {
          updateDividerInfo(null, null, true);
          dividerForm.style.display = "block";

          for (let i = 0; i < VISIBLE_HALF; i++) {
            const dummy = createDummyElement();
            dummy.style.order = 1;
            fragAbove.appendChild(dummy);
          }
          for (let i = 0; i < VISIBLE_HALF; i++) {
            const dummy = createDummyElement();
            dummy.style.order = 3;
            fragBelow.appendChild(dummy);
          }

          listEl.appendChild(fragAbove);
          listEl.appendChild(fragBelow);
          if (shouldFocus) setTimeout(() => dynamicInput.focus({ preventScroll: true }), 50);
          return;
        }

        // Binary search untuk divider index — O(log n)
        let lo = 0, hi = guesses.length;
        while (lo < hi) {
          const mid = (lo + hi) >>> 1;
          if (guesses[mid] < secretWord) lo = mid + 1;
          else hi = mid;
        }
        const dividerIndex = lo;

        if (isGameOver) {
          dividerForm.style.display = "none";
          let startIndex = Math.max(0, dividerIndex - VISIBLE_HALF);
          let endIndex = Math.min(guesses.length, dividerIndex + VISIBLE_HALF + 1);

          const realAbove = dividerIndex - startIndex;
          for (let i = 0; i < VISIBLE_HALF - realAbove; i++) {
            const dummy = createDummyElement();
            dummy.style.order = 1;
            fragAbove.appendChild(dummy);
          }
          for (let i = startIndex; i < endIndex; i++) {
            const el = createGuessElement(guesses[i]);
            el.style.order = 1;
            fragAbove.appendChild(el);
          }
          const realBelow = endIndex - dividerIndex - 1;
          const padBelowCount = Math.max(0, VISIBLE_HALF - realBelow);
          for (let i = 0; i < padBelowCount; i++) {
            const dummy = createDummyElement();
            dummy.style.order = 1;
            fragAbove.appendChild(dummy);
          }

          listEl.appendChild(fragAbove);
        } else {
          dividerForm.style.display = "block";
          let startIndex = Math.max(0, dividerIndex - VISIBLE_HALF);
          let endIndex = Math.min(guesses.length, dividerIndex + VISIBLE_HALF);
          let lowerBound = dividerIndex > 0 ? guesses[dividerIndex - 1] : null;
          let upperBound = dividerIndex < guesses.length ? guesses[dividerIndex] : null;

          const realAbove = dividerIndex - startIndex;
          for (let i = 0; i < VISIBLE_HALF - realAbove; i++) {
            const dummy = createDummyElement();
            dummy.style.order = 1;
            fragAbove.appendChild(dummy);
          }
          for (let i = startIndex; i < dividerIndex; i++) {
            const el = createGuessElement(guesses[i]);
            el.style.order = 1;
            fragAbove.appendChild(el);
          }

          updateDividerInfo(lowerBound, upperBound, false);

          for (let i = dividerIndex; i < endIndex; i++) {
            const el = createGuessElement(guesses[i]);
            el.style.order = 3;
            fragBelow.appendChild(el);
          }
          const realBelow = endIndex - dividerIndex;
          for (let i = 0; i < VISIBLE_HALF - realBelow; i++) {
            const dummy = createDummyElement();
            dummy.style.order = 3;
            fragBelow.appendChild(dummy);
          }

          listEl.appendChild(fragAbove);
          listEl.appendChild(fragBelow);
        }

        // Kembalikan fokus hanya jika diminta secara eksplisit (host menebak)
        if (shouldFocus) {
          setTimeout(() => {
            dynamicInput.focus({ preventScroll: true });
          }, 50);
        }
      }

      function handleRankCommand(nickname, profilePic) {
        const wins = userWins[nickname] || 0;
        const currentTier = getTierInfo(wins);
        const nextTier = getNextTierInfo(wins);

        const container = document.getElementById("rank-toast-container");
        container.innerHTML = "";
        const toast = document.createElement("div");

        let progressHTML = "";
        if (nextTier) {
          const needed = nextTier.minWins - wins;
          const currentFloor = currentTier.minWins;
          const totalRequired = nextTier.minWins - currentFloor;
          const currentProgress = wins - currentFloor;
          const progressPercent = Math.min(100, Math.max(0, (currentProgress / totalRequired) * 100));
          const nextColorClass = nextTier.color.split(" ")[0];

          progressHTML = `
                    <div class="w-full mt-3">

                        </div>
                    </div>

            const bar = document.getElementById("progress-fill");

        toast.className = `relative overflow-hidden bg-[#0a1118]/90 backdrop-blur-xl border border-gray-700/50 p-4 rounded-2xl shadow-[0_10px_40px_rgb(0,0,0,0.6)] flex flex-col transform transition-all duration-500 translate-y-8 opacity-0 max-w-[calc(100vw-2rem)] w-80`;
        toast.innerHTML = `
                <div class="flex items-center gap-3 w-full">

            toast.classList.add("translate-y-0", "opacity-100");

      function handleWin() {
        const details = guessDetails[secretWord] || { nickname: "Kamu", profilePic: null };
        userWins[details.nickname] = (userWins[details.nickname] || 0) + 1;
        localStorage.setItem("guessGameWins", JSON.stringify(userWins));

        // --- STREAK LOGIC ---
        if (streakHolder === details.nickname) {
          currentStreak++;
        } else {
          streakHolder = details.nickname;
          currentStreak = 1;
        }

        lastWinnerData = { nickname: details.nickname, profilePic: details.profilePic, word: secretWord };
        localStorage.setItem("guessGameLastWinner", JSON.stringify(lastWinnerData));

        isGameOver = true;
        renderUI();

        if (details.profilePic) winAvatarContainer.innerHTML = `<img src="${escapeHTML(details.profilePic)}" class="w-full h-full rounded-full object-cover border-[3px] border-[#0a1118]">`;
        else winAvatarContainer.innerHTML = `<div class="w-full h-full rounded-full overflow-hidden border-[3px] border-[#0a1118]">${userAvatarSVG}</div>`;

        winTitleEl.innerText = `${details.nickname} Menang!`;

        // --- STREAK UI di Win Modal ---
        const streakContainer = document.getElementById("win-streak-container");
        const streakBadge = document.getElementById("win-streak-badge");
        const streakLabel = document.getElementById("win-streak-label");
        const streakNumber = document.getElementById("win-streak-number");

        if (currentStreak >= 2) {
          const s = getStreakStyle(currentStreak);
          streakContainer.classList.remove("hidden");
          streakContainer.classList.add("flex", "justify-center");
          streakBadge.className = `relative overflow-hidden mx-auto w-fit flex items-center gap-2 px-4 py-2 rounded-xl border streak-badge-shimmer ${s.bg} ${s.border}`;
          streakLabel.className = `text-[10px] font-bold uppercase tracking-[0.15em] ${s.color}`;
          streakLabel.innerText = s.label;
          streakNumber.className = `text-lg font-black ${s.color} streak-glow`;
          streakNumber.innerText = `x${currentStreak}`;
        } else {
          streakContainer.classList.add("hidden");
          streakContainer.classList.remove("flex", "justify-center");
        }

        setTimeout(() => {
          winWordEl.innerText = secretWord;
          winModalOverlay.classList.remove("opacity-0", "pointer-events-none");
          winModalOverlay.classList.add("opacity-100");
          winModalContent.classList.remove("scale-95", "translate-y-8");
          winModalContent.classList.add("scale-100", "translate-y-0");

          // Floating sparkle particles behind the word
          const particleBox = document.getElementById("win-word-particles");
          particleBox.innerHTML = "";
          const sparkleColors = ["#4ade80", "#3b82f6", "#facc15", "#a855f7", "#22d3ee"];
          for (let i = 0; i < 12; i++) {
            const dot = document.createElement("div");
            const c = sparkleColors[Math.floor(Math.random() * sparkleColors.length)];
            const size = 3 + Math.random() * 4;
            const left = 10 + Math.random() * 80;
            const delay = Math.random() * 2;
            const dur = 2 + Math.random() * 2;
            dot.style.cssText = `position:absolute; bottom:0; left:${left}%; width:${size}px; height:${size}px; background:${c}; border-radius:50%; opacity:0.7; animation: float-particle ${dur}s ${delay}s ease-out infinite; box-shadow: 0 0 6px ${c};`;
            particleBox.appendChild(dot);
          }

          playWinSound();
          shootConfetti();

          let countdown = 10;
          btnRestart.innerText = `Main Lagi (${countdown}s)`;

          autoRestartInterval = setInterval(() => {
            countdown--;
            if (countdown > 0) btnRestart.innerText = `Main Lagi (${countdown}s)`;
            else clearInterval(autoRestartInterval);
          }, 1000);

          autoRestartTimeout = setTimeout(() => {
            initGame();
          }, 10000);
        }, 500);
      }

      // --- EVENT LISTENERS ---
      btnRestart.addEventListener("click", initGame);

      document.addEventListener("DOMContentLoaded", async () => {
        dividerForm = document.getElementById("secret-divider");
        dynamicInput = document.getElementById("dynamic-guess-input");

        // Tambahan: kembalikan inputmode none jika keyboard ditutup/fokus hilang oleh Host
        dynamicInput.addEventListener("blur", () => {
          if (!isGameOver) {
            dynamicInput.setAttribute("inputmode", "none");
          }
        });

        dividerForm.onsubmit = function (e) {
          e.preventDefault();
          const inputVal = dynamicInput.value;
          if (inputVal) {
            if (inputVal.trim().toLowerCase().startsWith("!myrank")) {
              handleRankCommand("Host", null);
              dynamicInput.value = "";
            }
            // Simulasi !play (Untuk testing form host)
            else if (inputVal.trim().toLowerCase().startsWith("!play ")) {
              if (globalWs && globalWs.readyState === WebSocket.OPEN) {
                globalWs.send(
                  JSON.stringify({
                    type: "simulate_chat",
                    data: { comment: inputVal, nickname: "Host", profilePictureUrl: null }
                  })
                );
              }
              dynamicInput.value = "";
            } else if (inputVal.trim().toLowerCase() === "!skip") {
              if (globalWs && globalWs.readyState === WebSocket.OPEN) {
                globalWs.send(JSON.stringify({ type: "simulate_chat", data: { comment: "!skip" } }));
              }
              dynamicInput.value = "";
            } else {
              const success = processGuess(inputVal, "Host", null, true);
              if (success) dynamicInput.value = "";
            }
          }
        };

        function activateKeyboard() {
          if (isGameOver) return;
          if (dynamicInput.getAttribute("inputmode") === "none") {
            dynamicInput.removeAttribute("inputmode");
            dynamicInput.blur();
            setTimeout(() => dynamicInput.focus({ preventScroll: true }), 50);
          } else {
            dynamicInput.focus({ preventScroll: true });
          }
        }

        listEl.addEventListener("click", activateKeyboard);

        // Music Player Buttons Logic
        const btnPrev = document.getElementById("btn-prev");
        const btnPlayPause = document.getElementById("btn-play-pause");
        const btnSkip = document.getElementById("btn-skip");
        const progressContainer = document.getElementById("progress-container");

        // FIX #10: Hapus duplicate declaration — queueToggleBtn & queueChevron sudah ada di scope global

        queueToggleBtn.addEventListener("click", () => {
          isQueueOpen = !isQueueOpen;
          if (isQueueOpen) {
            queueContainer.classList.remove("hidden");
            queueContainer.classList.add("flex");
            queueChevron.classList.add("rotate-180");
          } else {
            queueContainer.classList.remove("flex");
            queueContainer.classList.add("hidden");
            queueChevron.classList.remove("rotate-180");
          }
        });

        btnPrev.addEventListener("click", () => {
          audioPlayer.currentTime = 0;
        });

        btnPlayPause.addEventListener("click", () => {
          if (audioPlayer.paused) audioPlayer.play();
          else audioPlayer.pause();
        });

        btnSkip.addEventListener("click", () => {
          if (globalWs && globalWs.readyState === WebSocket.OPEN) {
            globalWs.send(JSON.stringify({ type: "simulate_chat", data: { comment: "!skip" } }));
          }
        });

        progressContainer.addEventListener("click", (e) => {
          if (!audioPlayer.duration) return;
          const rect = progressContainer.getBoundingClientRect();
          const percentage = (e.clientX - rect.left) / rect.width;
          audioPlayer.currentTime = audioPlayer.duration * percentage;
        });

        setupWebSocket();
        await loadDictionaries();
        initGame();
      });
    </script>
  </body>
</html>
